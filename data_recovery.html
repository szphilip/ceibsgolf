<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CEIBS Golf 数据恢复工具</title>
<style>
body {
  font-family: 'Arial', sans-serif;
  max-width: 1200px;
  margin: 0 auto;
  padding: 20px;
  background: #f5f5f5;
}
.container {
  background: white;
  padding: 30px;
  border-radius: 8px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.1);
}
h1 {
  color: #1a5c3a;
  border-bottom: 3px solid #1a5c3a;
  padding-bottom: 10px;
}
.section {
  margin: 30px 0;
  padding: 20px;
  background: #f9f9f9;
  border-radius: 6px;
}
.section h2 {
  color: #2d7a52;
  margin-top: 0;
}
button {
  background: #1a5c3a;
  color: white;
  border: none;
  padding: 12px 24px;
  border-radius: 6px;
  cursor: pointer;
  font-size: 14px;
  margin: 5px;
}
button:hover {
  background: #2d7a52;
}
button.danger {
  background: #c0392b;
}
button.danger:hover {
  background: #e74c3c;
}
textarea {
  width: 100%;
  min-height: 200px;
  padding: 10px;
  border: 1px solid #ddd;
  border-radius: 4px;
  font-family: monospace;
  font-size: 12px;
}
.info {
  padding: 15px;
  background: #e8f3ed;
  border-left: 4px solid #1a5c3a;
  margin: 15px 0;
}
.warning {
  padding: 15px;
  background: #fff3cd;
  border-left: 4px solid #f39c12;
  margin: 15px 0;
}
.error {
  padding: 15px;
  background: #f8d7da;
  border-left: 4px solid #c0392b;
  margin: 15px 0;
}
.stats {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
  gap: 15px;
  margin: 20px 0;
}
.stat-box {
  padding: 15px;
  background: white;
  border-radius: 6px;
  border: 2px solid #e0e0e0;
}
.stat-box h3 {
  margin: 0 0 10px 0;
  color: #666;
  font-size: 14px;
}
.stat-box .number {
  font-size: 32px;
  font-weight: bold;
  color: #1a5c3a;
}
</style>
</head>
<body>
<div class="container">
  <h1>🔧 CEIBS Golf 数据恢复工具</h1>
  
  <div class="section">
    <h2>📊 当前数据状态</h2>
    <div id="status"></div>
    <div class="stats" id="stats"></div>
    <button onclick="checkData()">🔍 检查数据</button>
    <button onclick="viewAllData()">👁️ 查看完整数据</button>
  </div>
  
  <div class="section">
    <h2>💾 数据备份</h2>
    <div class="info">
      <strong>建议：</strong>在进行任何恢复操作前，先备份当前数据！
    </div>
    <button onclick="backupData()">📦 下载当前数据备份</button>
    <button onclick="copyToClipboard()">📋 复制数据到剪贴板</button>
  </div>
  
  <div class="section">
    <h2>♻️ 数据恢复</h2>
    <div class="warning">
      <strong>注意：</strong>恢复数据将覆盖当前所有数据，请确保已备份！
    </div>
    <p>从备份文件或剪贴板粘贴JSON数据：</p>
    <textarea id="restoreData" placeholder='粘贴JSON数据到这里，例如：{"members":[...],"matches":[...],...}'></textarea>
    <br>
    <button onclick="restoreFromText()">✅ 恢复数据</button>
    <button onclick="uploadBackup()">📁 从文件恢复</button>
    <input type="file" id="fileInput" accept=".json,.txt" style="display:none" onchange="loadFromFile(event)">
  </div>
  
  <div class="section">
    <h2>🗑️ 数据清理</h2>
    <div class="error">
      <strong>危险操作：</strong>以下操作将永久删除数据！
    </div>
    <button class="danger" onclick="clearAllData()">⚠️ 清空所有数据</button>
    <button class="danger" onclick="resetToDefault()">🔄 重置为默认数据</button>
  </div>
  
  <div class="section">
    <h2>📝 详细数据查看</h2>
    <div id="detailView"></div>
  </div>
</div>

<script>
function checkData() {
  const saved = localStorage.getItem('ceibs_golf_data');
  const statusDiv = document.getElementById('status');
  const statsDiv = document.getElementById('stats');
  
  if(!saved) {
    statusDiv.innerHTML = '<div class="error">❌ 未找到任何保存的数据</div>';
    statsDiv.innerHTML = '';
    return;
  }
  
  try {
    const data = JSON.parse(saved);
    statusDiv.innerHTML = '<div class="info">✅ 数据加载成功</div>';
    
    const stats = {
      '队员': data.members?.length || 0,
      '赛事': data.matches?.length || 0,
      '球场': data.courses?.length || 0,
      '精彩瞬间': data.gallery?.length || 0,
      '月度财务记录': data.finance?.monthlyRecords?.length || 0,
      '赛事财务记录': Object.keys(data.finance?.matchFinancials || {}).length
    };
    
    let html = '';
    for(let key in stats) {
      html += `<div class="stat-box"><h3>${key}</h3><div class="number">${stats[key]}</div></div>`;
    }
    statsDiv.innerHTML = html;
    
    // 检查2025年终赛
    if(data.matches) {
      const yearEndMatch = data.matches.find(m => m.name && m.name.includes('2025') && m.name.includes('年终'));
      if(yearEndMatch) {
        statusDiv.innerHTML += '<div class="info">✅ 找到2025年终赛数据</div>';
      } else {
        statusDiv.innerHTML += '<div class="warning">⚠️ 未找到2025年终赛数据</div>';
      }
    }
    
  } catch(e) {
    statusDiv.innerHTML = '<div class="error">❌ 数据解析失败: ' + e.message + '</div>';
  }
}

function viewAllData() {
  const saved = localStorage.getItem('ceibs_golf_data');
  if(!saved) {
    alert('没有找到数据');
    return;
  }
  
  const detailDiv = document.getElementById('detailView');
  const data = JSON.parse(saved);
  
  let html = '<h3>赛事列表：</h3><ul>';
  if(data.matches && data.matches.length > 0) {
    data.matches.forEach(m => {
      html += `<li><strong>${m.name}</strong> - ${m.date} (${m.scores?.length || 0}人) - ${m.published ? '已发布' : '未发布'}</li>`;
    });
  } else {
    html += '<li>无赛事数据</li>';
  }
  html += '</ul>';
  
  html += '<h3>精彩瞬间列表：</h3><ul>';
  if(data.gallery && data.gallery.length > 0) {
    data.gallery.forEach(g => {
      html += `<li><strong>${g.title}</strong> - ${g.date} - ${g.type}</li>`;
    });
  } else {
    html += '<li>无精彩瞬间数据</li>';
  }
  html += '</ul>';
  
  detailDiv.innerHTML = html;
}

function backupData() {
  const saved = localStorage.getItem('ceibs_golf_data');
  if(!saved) {
    alert('没有数据可以备份');
    return;
  }
  
  const blob = new Blob([saved], {type: 'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'ceibs_golf_backup_' + new Date().toISOString().slice(0,10) + '.json';
  a.click();
  URL.revokeObjectURL(url);
  alert('✅ 数据已下载');
}

function copyToClipboard() {
  const saved = localStorage.getItem('ceibs_golf_data');
  if(!saved) {
    alert('没有数据可以复制');
    return;
  }
  
  navigator.clipboard.writeText(saved).then(() => {
    alert('✅ 数据已复制到剪贴板');
  }).catch(err => {
    alert('复制失败: ' + err);
  });
}

function restoreFromText() {
  const text = document.getElementById('restoreData').value.trim();
  if(!text) {
    alert('请先粘贴数据');
    return;
  }
  
  if(!confirm('确定要恢复数据吗？这将覆盖当前所有数据！')) {
    return;
  }
  
  try {
    const data = JSON.parse(text);
    localStorage.setItem('ceibs_golf_data', JSON.stringify(data));
    alert('✅ 数据恢复成功！请刷新网站页面。');
    checkData();
  } catch(e) {
    alert('❌ 数据格式错误: ' + e.message);
  }
}

function uploadBackup() {
  document.getElementById('fileInput').click();
}

function loadFromFile(event) {
  const file = event.target.files[0];
  if(!file) return;
  
  const reader = new FileReader();
  reader.onload = function(e) {
    document.getElementById('restoreData').value = e.target.result;
    alert('✅ 文件已加载，请点击"恢复数据"按钮');
  };
  reader.readAsText(file);
}

function clearAllData() {
  if(!confirm('⚠️ 确定要清空所有数据吗？此操作不可恢复！')) {
    return;
  }
  if(!confirm('⚠️⚠️ 再次确认：真的要删除所有数据吗？')) {
    return;
  }
  
  localStorage.removeItem('ceibs_golf_data');
  alert('✅ 所有数据已清空');
  checkData();
}

function resetToDefault() {
  if(!confirm('确定要重置为默认数据吗？')) {
    return;
  }
  
  localStorage.removeItem('ceibs_golf_data');
  alert('✅ 已重置，请刷新网站页面');
}

// 页面加载时自动检查
window.onload = function() {
  checkData();
};
</script>
</body>
</html>
